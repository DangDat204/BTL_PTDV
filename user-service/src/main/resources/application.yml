server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    # For Docker: set SPRING_DATASOURCE_URL=jdbc:mysql://mysql-main:3306/user_db?...
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
